<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django OCR Tool{% endblock %}</title>
    
    <!-- Tailwind CSS (CDN for rapid prototyping as requested) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        },
                        dark: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#030712',
                        }
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-2px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(2px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #030712; 
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-nav {
            background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155; 
        }

        .blob-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        
        .blob-1 {
            position: absolute;
            top: -15%;
            left: -5%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, rgba(3, 7, 18, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
        }

        .blob-2 {
            position: absolute;
            bottom: -20%;
            right: -5%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, rgba(3, 7, 18, 0) 70%);
            border-radius: 50%;
            filter: blur(80px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans selection:bg-primary-500/30">

    <div class="blob-bg">
        <div class="blob-1 animate-pulse-slow"></div>
        <div class="blob-2 animate-pulse-slow" style="animation-delay: 3s;"></div>
    </div>

    <nav class="glass-nav sticky top-0 z-50 py-3 px-6 md:px-12">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="{% url 'upload_document' %}" class="flex items-center gap-2 group">
                <div class="w-8 h-8 rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-white transition-all duration-300 group-hover:border-primary-500/50">
                    <i class="ph ph-scan text-lg"></i>
                </div>
                <span class="font-display font-semibold text-lg tracking-tight text-white group-hover:text-primary-400 transition-colors">NexusOCR</span>
            </a>
            
            <div class="flex items-center gap-4 md:gap-8">
                <a href="{% url 'document_list' %}" class="text-sm font-medium text-slate-400 hover:text-white transition-colors flex items-center gap-1.5">
                    <i class="ph ph-stack"></i>
                    <span class="hidden sm:inline">Stack</span>
                </a>
                <a href="{% url 'upload_document' %}" class="bg-white text-black text-xs font-bold py-2 px-4 rounded-lg hover:bg-slate-200 transition-all flex items-center gap-2">
                    <i class="ph-bold ph-plus"></i>
                    <span>NEW</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow py-8 px-4 sm:px-6 lg:px-8 relative z-10 w-full">
        <div class="max-w-5xl w-full mx-auto">
            {% if messages %}
                <div class="mb-6 flex flex-col gap-2 animate-fade-in-up">
                    {% for message in messages %}
                        <div class="px-4 py-3 rounded-lg border flex items-center gap-3 backdrop-blur-md {% if message.tags == 'error' %}bg-rose-500/5 border-rose-500/20 text-rose-300{% else %}bg-emerald-500/5 border-emerald-500/20 text-emerald-300{% endif %}">
                            <i class="ph-bold {% if message.tags == 'error' %}ph-warning-circle text-rose-500{% else %}ph-check-circle text-emerald-500{% endif %}"></i>
                            <p class="text-xs font-semibold tracking-wide uppercase">{{ message }}</p>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="py-6 text-center text-slate-600 text-[10px] tracking-[0.2em] uppercase border-t border-white/5 relative z-10">
        <p>NexusOCR &copy; {% now "Y" %} / Laboratory Systems</p>
    </footer>

    <!-- Additional scripts -->
    {% block scripts %}{% endblock %}
</body>
</html>
